short_bio: >-
  <p>
    I am an interdisciplinary researcher whose research interests focus on the spatial assessment and planning of ecosystem services in the context of landscape transformation. 
    I am particularly interested in the trade-offs and synergies among ecological, cultural, and socioeconomic dimensions, and I aim to use GIS-based spatial analytical frameworks to support sustainable land-use planning and nature-based climate adaptation solutions in rapidly changing landscapes.
    <img src="assets/images/photos/interst.png" alt="Research Interests" 
         style="float: left; width: 350px; margin-right: 10px; border-radius: 8px;">
  </p>

  <p>
    I received my <strong>Master of Management degree in Tourism Management</strong> from 
    Northwest Normal University in June 2026, under the supervision of Prof. Binbin Ma. 
    I earned my Bachelor’s degree in E-commerce from Century College, Beijing University of Posts and Telecommunications. 
    Before pursuing my master’s degree, I worked as an Administrative Assistant to the Business Manager at Xinjiang Wanhua Construction Project Management Co., Ltd., 
    and as a Team Leader for Primary School Mathematics Tutoring at Zuoyebang Technology Education (Chengdu) Co., Ltd.
  </p>

  <p>
    My first-author research has been published in international journals including <i>Ecological Indicators</i>, 
    <i>Journal of Arid Land</i>, and <i>Journal of Cleaner Production</i>. 
    My work focuses on the trade-offs and synergies of ecosystem services in Qilian Mountain National Park, 
    as well as the spatiotemporal relationships between tourism development and ecosystem service value.
  </p>



