short_bio: >-
  <p>
    I am a master's student in Tourism Management at 
    <a href="https://www.nwnu.edu.cn/" target="_blank">Northwest Normal University</a>. 
    My research focuses on ecosystem services, landscape transformation, sustainable tourism, 
    and GIS-based spatial analysis.
  </p>

 <p>
    My current research examines the spatiotemporal differentiation, trade-offs, and synergies of 
    ecosystem services in national parks and urban agglomerations. I am particularly interested in 
    integrating ecological, cultural, and socio-economic dimensions of landscape value into sustainable 
    land-use planning and regional governance.
  </p>

  <p>
    I use GIS, remote sensing, spatial modeling, and statistical methods to support ecosystem service 
    assessment, landscape planning, tourism resource evaluation, and place sustainability. My broader 
    research interests include nature-based approaches to climate adaptation, human well-being, and 
    planning decision-making in rapidly urbanising landscapes.
  </p>

