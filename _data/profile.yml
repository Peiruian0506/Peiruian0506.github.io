short_bio: >-
  <p>
    I am a master's student in Tourism Management at Northwest Normal University.
    My research focuses on ecosystem services, landscape transformation, sustainable tourism,
    and GIS-based spatial analysis.
  </p>

  <p>
    My research examines the spatiotemporal differentiation, trade-offs, and synergies of
    ecosystem services in national parks and urban agglomerations. I am particularly interested
    in integrating ecological, cultural, and socio-economic dimensions of landscape value into
    sustainable land-use planning and regional governance.
  </p>

  <p>
    I use GIS, remote sensing, spatial modeling, and statistical methods to support ecosystem
    service assessment, landscape planning, tourism resource evaluation, and place sustainability.
  </p>

